<head>

  <style>
    :root {

    * { box-sizing: border-box; }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px 60px; }

    .hero p { margin: 0; opacity: .96; }
    .auth-card, .toolbar, .insights, .chapter, .card, .result { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 16px rgba(15,23,42,.04); }

    .auth-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 8px; }

    .insights { padding: 16px; margin-bottom: 16px; }
    .insights h3 { margin: 0 0 8px; font-size: 17px; }

    .stat { background: white; border: 1px solid var(--border); border-radius: 999px; padding: 10px 14px; font-weight: 700; box-shadow: 0 2px 10px rgba(15,23,42,.04); }
    .chapter { padding: 18px; margin-bottom: 16px; }
    .chapter h2 { margin: 0 0 10px; font-size: 18px; color: var(--accent); }
    .card { padding: 14px 14px 12px; margin-bottom: 12px; background: #fcfdff; }
    .card-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }

    .qtext { font-weight: 700; margin: 0 0 10px; }
    .options { display: grid; gap: 8px; }
    button.option { width: 100%; text-align: left; border: 1px solid var(--border); background: white; border-radius: 10px; padding: 10px 12px; cursor: pointer; font-size: 15px; color: var(--text); transition: transform .15s ease, border-color .15s ease; }
    button.option:hover { transform: translateY(-1px); border-color: #93c5fd; }
    button.option:disabled { cursor: default; opacity: 1; }
    button.option.correct { border-color: var(--success); background: #ecfdf3; color: var(--success); font-weight: 700; }
    button.option.wrong { border-color: var(--danger); background: #fef2f2; color: var(--danger); font-weight: 700; }
    .feedback { margin-top: 10px; padding: 10px 12px; border-radius: 10px; font-weight: 700; display: none; }
    .feedback.show { display: block; }
    .feedback.correct { background: #ecfdf3; color: var(--success); border: 1px solid #a7f3d0; }
    .feedback.wrong { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
    .actions { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .btn { padding: 12px 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 15px; }
    .btn.primary { background: var(--accent); color: white; }
    .btn.secondary { background: white; color: var(--text); border: 1px solid var(--border); }
    .result { display: none; margin-top: 16px; padding: 16px; border-radius: 14px; background: #eff6ff; border: 1px solid #bfdbfe; }
    .result.show { display: block; }
    .footer { text-align: center; color: var(--muted); font-size: 13px; margin-top: 24px; }
    .weak-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .chip { background: #eff6ff; color: var(--accent); padding: 6px 10px; border-radius: 999px; font-size: 13px; font-weight: 700; }
    .status { display: none; margin: 14px 0; padding: 10px 14px; border-radius: 10px; font-weight: 700; font-size: 14px; }
    .status.show { display: block; }
    .status.info { background: #eff6ff; color: var(--accent); border: 1px solid #bfdbfe; }
    .status.error { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
    button[disabled] { opacity: .65; cursor: default; }
    @media (max-width: 700px) { .hero h1 { font-size: 24px; } }
  </style>
</head>

      { id: 'q85', chapter: 'Chapter 9: Group Life, Business Uses, and Key Person', prompt: 'Group life insurance usually has:', options: ['Simpler underwriting and lower cost per unit of coverage', 'No beneficiaries', 'Higher premiums than individual policies', 'No eligibility requirements'], answerIndex: 0 },
      { id: 'q86', chapter: 'Chapter 9: Group Life, Business Uses, and Key Person', prompt: 'A common use of life insurance in business is to:', options: ['Fund a business owner’s buyout or succession plan', 'Eliminate all payroll taxes', 'Replace a pension plan', 'Guarantee profits'], answerIndex: 0 },
      { id: 'q87', chapter: 'Chapter 9: Group Life, Business Uses, and Key Person', prompt: 'In a buy-sell arrangement, the policy is often owned by:', options: ['The business or the owners', 'The beneficiary only', 'The state insurance department', 'A bank'], answerIndex: 0 },
      { id: 'q88', chapter: 'Chapter 9: Group Life, Business Uses, and Key Person', prompt: 'A common reason for key person insurance is to:', options: ['Protect the business from revenue disruption', 'Increase employee turnover', 'Avoid all claims', 'Replace the need for underwriting'], answerIndex: 0 },
      { id: 'q89', chapter: 'Chapter 9: Group Life, Business Uses, and Key Person', prompt: 'Group life coverage is often offered on an:', options: ['Employer-sponsored basis', 'Individual-only basis', 'Investment-only basis', 'No-benefit basis'], answerIndex: 0 },
      { id: 'q90', chapter: 'Chapter 9: Group Life, Business Uses, and Key Person', prompt: 'One reason businesses buy life insurance is to:', options: ['Fund a future purchase or transfer of ownership', 'Avoid all state regulation', 'Guarantee employee retention', 'Reduce needed capital'], answerIndex: 0 },
      { id: 'q91', chapter: 'Chapter 10: Policy Replacement, Suitability, and Consumer Protection', prompt: 'Policy replacement is most likely to occur when a client:', options: ['Replaces an existing policy with a new one', 'Pays premiums on time', 'Adds a beneficiary', 'Reviews the policy annually'], answerIndex: 0 },
      { id: 'q92', chapter: 'Chapter 10: Policy Replacement, Suitability, and Consumer Protection', prompt: 'Suitability means the policy should:', options: ['Fit the consumer’s needs and circumstances', 'Be the highest commission product', 'Be identical to all others', 'Have no exclusions'], answerIndex: 0 },
      { id: 'q93', chapter: 'Chapter 10: Policy Replacement, Suitability, and Consumer Protection', prompt: 'A comparison of old and new coverage is important because:', options: ['It helps identify possible gaps or losses in benefits', 'It guarantees no underwriting', 'It removes all policy charges', 'It eliminates the need for disclosures'], answerIndex: 0 },
      { id: 'q94', chapter: 'Chapter 10: Policy Replacement, Suitability, and Consumer Protection', prompt: 'The goal of consumer protection rules is to:', options: ['Protect buyers from unfair or misleading practices', 'Increase insurer profits', 'Eliminate agent commissions', 'Avoid all regulation'], answerIndex: 0 },
      { id: 'q95', chapter: 'Chapter 10: Policy Replacement, Suitability, and Consumer Protection', prompt: 'A producer should disclose material facts so the client can:', options: ['Make an informed decision', 'Sign quickly without review', 'Avoid reading the policy', 'Accept all policy changes'], answerIndex: 0 },
      { id: 'q96', chapter: 'Chapter 10: Policy Replacement, Suitability, and Consumer Protection', prompt: 'If a policy is replaced, the producer should carefully explain:', options: ['Any changes in benefits, cost, and guarantees', 'Only the new policy number', 'Only the premium due date', 'Only the beneficiary name'], answerIndex: 0 },
      { id: 'q97', chapter: 'Chapter 10: Policy Replacement, Suitability, and Consumer Protection', prompt: 'A client’s long-term objectives should be considered when:', options: ['Choosing among policy alternatives', 'Selecting a beneficiary only', 'Cancelling the policy', 'Ignoring underwriting results'], answerIndex: 0 },
      { id: 'q98', chapter: 'Chapter 10: Policy Replacement, Suitability, and Consumer Protection', prompt: 'A major purpose of disclosure is to:', options: ['Ensure the client understands the product and its tradeoffs', 'Maximize agent commissions', 'Reduce the insurer’s duty', 'Avoid all documentation'], answerIndex: 0 },
      { id: 'q99', chapter: 'Chapter 10: Policy Replacement, Suitability, and Consumer Protection', prompt: 'One reason to review existing coverage before replacement is to:', options: ['Avoid accidental loss of valuable benefits', 'Increase premium complexity', 'Delay beneficiary naming', 'Create new risks'], answerIndex: 0 },
      { id: 'q100', chapter: 'Chapter 10: Policy Replacement, Suitability, and Consumer Protection', prompt: 'A responsible producer will document the client’s:', options: ['Needs, choices, and the reasons for the recommendation', 'Personal opinions only', 'Private financial records only', 'Preferred color of policy materials'], answerIndex: 0 }
    ];

    const chapterSelect = document.getElementById('chapterSelect');
    const authBox = document.getElementById('authBox');
    const quiz = document.getElementById('quiz');
    const insights = document.getElementById('insights');
    const scoreStat = document.getElementById('scoreStat');
    const progressStat = document.getElementById('progressStat');
    const resultBox = document.getElementById('resultBox');
    const startBtn = document.getElementById('startBtn');
    const resetSessionBtn = document.getElementById('resetSessionBtn');
    const submitBtn = document.getElementById('submitBtn');
    const statusBanner = document.getElementById('statusBanner');

    const activeUserKey = 'life-insurance-quiz-active-user-v1';

    let currentUser = null;
    let sessionQuestions = [];
    let answers = new Map();
    let score = 0;
    let statusTimer = null;

    function showStatus(message, type) {
      clearTimeout(statusTimer);
      statusBanner.className = `status show ${type || 'info'}`;
      statusBanner.textContent = message;
      statusBanner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      statusTimer = setTimeout(() => {
        statusBanner.className = 'status';
      }, 6000);
    }

    function withLoading(button, label, fn) {
      return async (...args) => {
        if (button.disabled) return;
        const originalText = button.textContent;
        button.disabled = true;
        button.textContent = label;
        try {
          await fn(...args);
        } catch (error) {
          showStatus(error.message || 'Something went wrong. Please try again.', 'error');
        } finally {
          button.disabled = false;
          button.textContent = originalText;
        }
      };
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function apiRequest(path, body) {
      const options = { headers: { 'Content-Type': 'application/json' } };
      if (body) options.body = JSON.stringify(body);
      const response = await fetch(path, { method: 'POST', ...options });
      const data = await response.json();
      if (!data.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    async function createUser(name) {
      const cleanName = String(name || '').trim();
      if (!cleanName) return null;
      const data = await apiRequest('/api/signup', { name: cleanName });
      currentUser = data.user;
      localStorage.setItem(activeUserKey, currentUser.id);
      return currentUser;
    }

    async function loginUser(name) {
      const cleanName = String(name || '').trim();
      if (!cleanName) return null;
      const activeId = localStorage.getItem(activeUserKey);
      if (activeId) {
        try {
          const data = await apiRequest('/api/login', { id: activeId, name: cleanName });
          currentUser = data.user;
          return currentUser;
        } catch (error) {
          console.warn(error);
        }
      }
      const data = await apiRequest('/api/signup', { name: cleanName });
      currentUser = data.user;
      localStorage.setItem(activeUserKey, currentUser.id);
      return currentUser;
    }

    async function loadCurrentUser() {
      const activeId = localStorage.getItem(activeUserKey);
      if (!activeId) {
        currentUser = null;
        return;
      }
      try {
        const response = await fetch(`/api/state/${activeId}`);
        const data = await response.json();
        if (data.ok) {
          currentUser = data.state;
        } else {
          currentUser = null;
          localStorage.removeItem(activeUserKey);
        }
      } catch (error) {
        currentUser = null;
        showStatus('Could not reach the server to load your account. Check your connection and reload.', 'error');
      }
    }

    async function saveCurrentUser() {
      if (!currentUser) return;
      localStorage.setItem(activeUserKey, currentUser.id);
      currentUser.preferredChapter = chapterSelect.value;
      currentUser = { ...currentUser, preferredChapter: chapterSelect.value };
      try {
        await apiRequest('/api/preferences', { id: currentUser.id, chapter: chapterSelect.value });
      } catch (error) {
        console.warn(error);
      }
    }

    function getQuestionStat(questionId) {
      if (!currentUser) return { correct: 0, incorrect: 0 };
      const data = currentUser.stats?.mastery?.[questionId] || { correct: 0, incorrect: 0 };
      return data;
    }

    async function updateQuestionStats(questionId, isCorrect) {
      if (!currentUser) return;
      const stat = currentUser.stats?.mastery?.[questionId] || { correct: 0, incorrect: 0 };
      if (isCorrect) {
        stat.correct += 1;
        currentUser.stats.totalCorrect += 1;
      } else {
        stat.incorrect += 1;
        currentUser.stats.totalIncorrect += 1;
      }
      currentUser.stats.mastery[questionId] = stat;
      currentUser.stats.totalSessions = Math.max(currentUser.stats.totalSessions, 1);
      await saveCurrentUser();
    }

    function getWeaknessScore(question) {
      const stat = getQuestionStat(question.id);
      const total = stat.correct + stat.incorrect;
      if (!total) return 3;
      const accuracy = stat.correct / total;
      return stat.incorrect * 3 + (accuracy < 0.6 ? 2 : 0) + (stat.correct === 0 ? 2 : 0);
    }

    async function buildAdaptivePool(chapterValue) {
      if (!currentUser) {
        const filtered = chapterValue === 'all'
          ? questions
          : questions.filter((question) => question.chapter === chapterValue);
        const ranked = filtered
          .map((question) => ({ ...question, weakness: getWeaknessScore(question) }))
          .sort((a, b) => b.weakness - a.weakness || a.id.localeCompare(b.id));
        return ranked.slice(0, Math.min(12, ranked.length));
      }
      const data = await apiRequest('/api/adaptive', { id: currentUser.id, chapter: chapterValue, limit: 12 });
      return data.queue.map((question) => {
        const full = questions.find((item) => item.id === question.id);
        return full ? { ...full, weakness: question.weakness } : { ...question, weakness: question.weakness };
      });
    }

    function populateChapterSelect() {
      const chapters = ['all', ...new Set(questions.map((question) => question.chapter))];
      chapterSelect.innerHTML = chapters.map((chapter) => {
        const label = chapter === 'all' ? 'All chapters' : chapter;
        return `<option value="${chapter}">${escapeHtml(label)}</option>`;
      }).join('');
      if (currentUser && currentUser.preferredChapter) {
        chapterSelect.value = currentUser.preferredChapter;
      }
    }

    function renderAuth() {
      if (!currentUser) {
        authBox.innerHTML = `
          <div class="auth-card">
            <strong>Sign in to save your progress</strong>
            <div class="auth-row">
              <input id="nameInput" type="text" placeholder="Enter your name" />
              <button class="btn primary" id="loginBtn">Continue</button>
            </div>
          </div>
        `;
        const loginBtn = document.getElementById('loginBtn');
        loginBtn.addEventListener('click', withLoading(loginBtn, 'Signing in...', async () => {
          const input = document.getElementById('nameInput');
          if (!input.value.trim()) {
            showStatus('Enter your name to sign in.', 'error');
            return;
          }
          const user = await loginUser(input.value);
          if (user) {
            await render();
          }
        }));
        return;
      }

      authBox.innerHTML = `
        <div class="auth-card">
          <strong>Welcome, ${escapeHtml(currentUser.name)}.</strong>
          <div class="auth-row">
            <span>Sessions completed: ${currentUser.stats?.totalSessions || 0}</span>
            <button class="btn secondary" id="logoutBtn">Sign out</button>
          </div>
        </div>
      `;
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem(activeUserKey);
        currentUser = null;
        render();
      });
    }

    function renderInsights() {
      if (!currentUser) {
        insights.innerHTML = '<strong>Sign in to start building a personalized adaptive practice set.</strong>';
        return;
      }

      const weakQuestions = questions
        .map((question) => ({ ...question, weakness: getWeaknessScore(question) }))
        .sort((a, b) => b.weakness - a.weakness)
        .slice(0, 5);

      const weakList = weakQuestions.map((question) => `<span class="chip">${escapeHtml(question.chapter)} · ${escapeHtml(question.id)}</span>`).join('');

      insights.innerHTML = `
        <h3>Your adaptive focus</h3>
        <p>Questions you miss most will appear first in future practice sessions.</p>
        <div class="weak-list">${weakList || '<span class="chip">No weak areas yet — start a session to build your profile.</span>'}</div>
      `;
    }

    function createQuizCards() {
      quiz.innerHTML = '';
      if (!sessionQuestions.length) {
        quiz.innerHTML = '<p>Start a practice session to begin adaptive review.</p>';
        return;
      }

      const grouped = {};
      sessionQuestions.forEach((question) => {
        if (!grouped[question.chapter]) grouped[question.chapter] = [];
        grouped[question.chapter].push(question);
      });

      Object.entries(grouped).forEach(([chapter, chapterQuestions]) => {
        const section = document.createElement('section');
        section.className = 'chapter';
        const title = document.createElement('h2');
        title.textContent = chapter;
        section.appendChild(title);

        chapterQuestions.forEach((question) => {
          const card = document.createElement('div');
          card.className = 'card';
          const head = document.createElement('div');
          head.className = 'card-head';
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = question.id.toUpperCase();
          const status = document.createElement('span');
          status.id = `status-${question.id}`;
          status.textContent = 'Pending';
          head.appendChild(badge);
          head.appendChild(status);

          const prompt = document.createElement('p');
          prompt.className = 'qtext';
          prompt.textContent = `${question.id.replace('q', '')}. ${question.prompt}`;

          const options = document.createElement('div');
          options.className = 'options';

          question.options.forEach((optionText, optionIndex) => {
            const button = document.createElement('button');
            button.className = 'option';
            button.type = 'button';
            button.innerHTML = `<strong>${String.fromCharCode(65 + optionIndex)}.</strong> ${escapeHtml(optionText)}`;
            button.addEventListener('click', () => handleAnswer(question, optionIndex, button));
            options.appendChild(button);
          });

          const feedback = document.createElement('div');
          feedback.className = 'feedback';
          feedback.id = `feedback-${question.id}`;

          card.appendChild(head);
          card.appendChild(prompt);
          card.appendChild(options);
          card.appendChild(feedback);
          section.appendChild(card);
        });

        quiz.appendChild(section);
      });
    }

    function updateStats() {
      const total = sessionQuestions.length || 0;
      scoreStat.textContent = `Score: ${score} / ${total}`;
      progressStat.textContent = `Answered: ${answers.size} / ${total}`;
    }

    async function handleAnswer(question, selectedIndex, button) {
      if (answers.has(question.id)) return;
      const buttons = button.parentElement.querySelectorAll('.option');
      const feedback = document.getElementById(`feedback-${question.id}`);
      const status = document.getElementById(`status-${question.id}`);
      const isCorrect = selectedIndex === question.answerIndex;

      answers.set(question.id, { selectedIndex, isCorrect });
      if (isCorrect) {
        score += 1;
        feedback.className = 'feedback show correct';
        feedback.textContent = 'Correct!';
        status.textContent = 'Correct';
        status.style.color = '#15803d';
      } else {
        feedback.className = 'feedback show wrong';
        feedback.textContent = `Incorrect. The correct answer is ${String.fromCharCode(65 + question.answerIndex)}. ${question.options[question.answerIndex]}`;
        status.textContent = 'Incorrect';
        status.style.color = '#dc2626';
      }

      buttons.forEach((btn, btnIndex) => {
        btn.disabled = true;
        if (btnIndex === question.answerIndex) {
          btn.classList.add('correct');
        } else if (btnIndex === selectedIndex) {
          btn.classList.add('wrong');
        }
      });

      if (currentUser) {
        await updateQuestionStats(question.id, isCorrect);
      }
      updateStats();
    }

    async function submitSession() {
      if (!sessionQuestions.length) {
        showStatus('Start a practice session before submitting.', 'error');
        return;
      }
      const percent = Math.round((score / sessionQuestions.length) * 100);
      const focusText = currentUser ? 'Your next session will prioritize the topics you missed most.' : 'Sign in to make the next session adaptive.';
      resultBox.className = 'result show';
      resultBox.innerHTML = `<strong>Session complete.</strong><br/>You scored ${score} out of ${sessionQuestions.length} (${percent}%).<br/>${focusText}`;
      resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
      if (currentUser) {
        await apiRequest('/api/session', {
          id: currentUser.id,
          chapter: chapterSelect.value,
          questions: sessionQuestions.map((question) => ({ id: question.id, chapter: question.chapter })),
          results: sessionQuestions.map((question) => ({
            id: question.id,
            correct: answers.get(question.id)?.isCorrect || false
          }))
        });
        currentUser.stats.totalSessions += 1;
        await saveCurrentUser();
        renderInsights();
      }
    }

    async function startPractice() {
      if (!currentUser) {
        showStatus('Enter your name above and click Continue to sign in first.', 'error');
        return;
      }
      await saveCurrentUser();
      sessionQuestions = await buildAdaptivePool(chapterSelect.value);
      answers = new Map();
      score = 0;
      createQuizCards();
      updateStats();
      resultBox.className = 'result';
      resultBox.innerHTML = '';
      renderInsights();
      quiz.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function render() {
      await loadCurrentUser();
      renderAuth();
      populateChapterSelect();
      renderInsights();
      createQuizCards();
      updateStats();
    }

    startBtn.addEventListener('click', withLoading(startBtn, 'Loading...', startPractice));
    resetSessionBtn.addEventListener('click', () => {
      sessionQuestions = [];
      answers = new Map();
      score = 0;
      createQuizCards();
      updateStats();
      resultBox.className = 'result';
      resultBox.innerHTML = '';
    });
    submitBtn.addEventListener('click', withLoading(submitBtn, 'Submitting...', submitSession));

    render().catch((error) => showStatus(error.message || 'Failed to load your saved progress.', 'error'));
  </script>
</body>
</html>
